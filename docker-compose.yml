services:
  users-service:
    build:
      context: .
      dockerfile: users-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_NAME=ai_knowledgebase
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
      - FRONTEND_BASE_URL=http://localhost:3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - microservices-network
    restart: unless-stopped

  chats-service:
    build:
      context: .
      dockerfile: chats-service/Dockerfile
    depends_on:
      - rabbitmq
    ports:
      - "50051:50051"
    environment:
      - PORT=50051
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_NAME=ai_knowledgebase
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - microservices-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - microservices-network

  # frontend-service:
